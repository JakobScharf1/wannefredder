{% for item in navs %}
    <li class="{{ item.style }}">
        <a class="nav-link rounded shadow {{ item.class }}" id="{{ item.id }}" data-bs-toggle="pill" href="{{ item.link }}" role="tab" aria-controls="{{ item.controls }}" aria-selected="false">
            <div class="text-center py-1">
                <h6 class="mb-0">{{ item.title }}</h6>
            </div>
        </a>
    </li>
{% endfor %}
