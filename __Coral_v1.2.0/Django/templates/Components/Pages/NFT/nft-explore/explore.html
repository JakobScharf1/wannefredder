{% for item in sliders2 %}
    <div class="col-lg-3 col-md-4 col-sm-6 col-12">
        <div class="nft-item p-4 rounded shadow bg-white">
            <div class="position-relative">
                <div class="nft-image position-relative overflow-hidden rounded shadow">
                    <img src="{{ item.img }}" class="img-fluid" alt="">
                    <div class="bg-overlay bg-black"></div>
                    <div class="bid-button position-absolute bottom-0 start-0 end-0 text-center pb-3">
                        <a href="{% url 'App:nft_detail' title=item.title|slugify %}" class="btn btn-sm btn-icon btn-pills btn-primary me-1" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Buy Now"><i data-feather="shopping-cart" class="fea icon-sm align-middle"></i></a>
                        <a href="{% url 'App:nft_detail' title=item.title|slugify %}" class="btn btn-sm btn-icon btn-pills btn-primary" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Bid Now"><i data-feather="zap" class="fea icon-sm align-middle"></i></a>
                    </div>
                </div>

                <div class="position-absolute top-0 start-0 m-3">
                    <a href="/creator-profile/"><img src="{{ item.img1 }}" class="avatar avatar-md-sm rounded-pill shadow img-thumbnail" alt=""></a>
                </div>
            </div>

            <div class="content pt-4 position-relative">
                <a href="{% url 'App:nft_detail' title=item.title|slugify %}" class="text-dark link-title h6">{{ item.title }}</a>

                <div class="d-flex justify-content-between mt-2">
                    <span class="rate text-primary">{{ item.title1 }}</span>
                    <span class="text-dark">{{ item.name }}</span>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
