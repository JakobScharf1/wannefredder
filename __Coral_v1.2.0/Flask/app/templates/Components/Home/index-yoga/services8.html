{% for item in services[14:18] %}
    <div class="col-lg-3 col-md-6 col-12">
        <div class="position-relative features text-center rounded p-4">
            <div class="position-relative d-flex justify-content-center">
                <img src="{{ item.img }}" class="avatar avatar-large" alt="">
                <div class="feature-icon bg-soft-primary position-absolute top-0 translate-middle avatar avatar-large"></div>
            </div>

            <div class="mt-4">
                <a href="{{ url_for('main.service_detail', title=slugify(item.title)) }}" class="h5 text-dark link-title">{{ item.title }}</a>
                <p class="text-muted mt-3">{{ item.desc }}</p>
                <a href="{{ url_for('main.service_detail', title=slugify(item.title)) }}" class="text-primary">Learn More <i class="mdi mdi-arrow-right align-middle"></i></a>
            </div>
        </div>
    </div>
{% endfor %}
