{% for item in collections[0:4] %}
    <div class="col-lg-3 col-md-6 col-12">
        <div class="nft-item nft-collection rounded shadow position-relative overflow-hidden">
            <div class="nft-image">
                <img src="{{ item.img }}" class="img-fluid" alt="">
            </div>

            <div class="position-absolute bottom-0 start-0 end-0 bg-white p-4">
                <div class="position-absolute top-0 start-50 translate-middle">
                    <img src="{{ item.img1 }}" class="avatar avatar-small rounded-pill img-thumbnail shadow-md" alt="">
                </div>

                <div class="mt-4 text-center">
                    <a href="/nft-explore/" class="text-dark link-title h5">{{ item.title }}</a>
                    
                    <p class="text-muted mb-0 small">{{ item.name }}</p>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
