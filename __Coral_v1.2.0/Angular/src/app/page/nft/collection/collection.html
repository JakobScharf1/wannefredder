<app-nft-navlight/>

<section class="bg-half-170 d-table w-100" style="background: url('assets/images/hero/pages.jpg') center;">
    <div class="bg-overlay bg-gradient-overlay"></div>
    <div class="container">
        <div class="row mt-5 justify-content-center">
            <div class="col-12">
                <div class="title-heading text-center">
                    <h5 class="heading fw-semibold mb-0 sub-heading text-white title-dark">Collection</h5>
                </div>
            </div>
        </div>

        <div class="position-middle-bottom">
            <nav aria-label="breadcrumb" class="d-block">
                <ul class="breadcrumb breadcrumb-muted mb-0 p-0">
                    <li class="breadcrumb-item"><a [routerLink]="'/'">Coral</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Collection</li>
                </ul>
            </nav>
        </div>
    </div>
</section>

<div class="position-relative">
    <div class="shape overflow-hidden text-white">
        <svg viewBox="0 0 2880 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 48H1437.5H2880V0H2160C1442.5 52 720 0 720 0H0V48Z" fill="currentColor"></path>
        </svg>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="row g-4">
            <div *ngFor="let item of nftData" class="col-lg-3 col-md-6 col-12">
                <div class="nft-item nft-collection rounded shadow position-relative overflow-hidden">
                    <div class="nft-image">
                        <img [src]="item.image" class="img-fluid" alt="">
                    </div>

                    <div class="position-absolute bottom-0 start-0 end-0 bg-white p-4">
                        <div class="position-absolute top-0 start-50 translate-middle">
                            <img [src]="item.client" class="avatar avatar-small rounded-pill img-thumbnail shadow-md" alt="">
                        </div>

                        <div class="mt-4 text-center">
                            <a [routerLink]="'/nft-explore'" class="text-dark link-title h5">{{item.tag}}</a>
                            
                            <p class="text-muted mb-0 small">27 Items</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mt-4">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Previous">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-left align-middle fs-6"></i></span>
                        </a>
                    </li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">1</a></li>
                    <li class="page-item active"><a class="page-link" [routerLink]="[]">2</a></li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">3</a></li>
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Next">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-right align-middle fs-6"></i></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>

<app-footer/>
