<app-nft-navlight/>

<section class="bg-half-170 d-table w-100" style="background: url('assets/images/hero/pages.jpg') center;">
    <div class="bg-overlay bg-gradient-overlay"></div>
    <div class="container">
        <div class="row mt-5 justify-content-center">
            <div class="col-12">
                <div class="title-heading text-center">
                    <h5 class="heading fw-semibold mb-0 sub-heading text-white title-dark">Explore Items</h5>
                </div>
            </div>
        </div>

        <div class="position-middle-bottom">
            <nav aria-label="breadcrumb" class="d-block">
                <ul class="breadcrumb breadcrumb-muted mb-0 p-0">
                    <li class="breadcrumb-item"><a [routerLink]="'/'">Coral</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Explore</li>
                </ul>
            </nav>
        </div>
    </div>
</section>

<div class="position-relative">
    <div class="shape overflow-hidden text-white">
        <svg viewBox="0 0 2880 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 48H1437.5H2880V0H2160C1442.5 52 720 0 720 0H0V48Z" fill="currentColor"></path>
        </svg>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="row g-4">
            <div *ngFor="let item of nftData" class="col-lg-3 col-md-4 col-sm-6 col-12">
                <div class="nft-item p-4 rounded shadow bg-white">
                    <div class="position-relative">
                        <div class="nft-image position-relative overflow-hidden rounded shadow">
                            <img [src]="item.image" class="img-fluid" alt="">
                            <div class="bg-overlay bg-black"></div>
                            <div class="bid-button position-absolute bottom-0 start-0 end-0 text-center pb-3">
                                <a [routerLink]="['/nft-detail',item.id]" class="btn btn-sm btn-icon btn-pills btn-primary me-1" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Buy Now"><i data-feather="shopping-cart" class="fea icon-sm align-middle"></i></a>
                                <a [routerLink]="['/nft-detail',item.id]" class="btn btn-sm btn-icon btn-pills btn-primary" data-bs-toggle="tooltip" data-bs-placement="bottom" data-bs-title="Bid Now"><i data-feather="zap" class="fea icon-sm align-middle"></i></a>
                            </div>
                        </div>

                        <div class="position-absolute top-0 start-0 m-3">
                            <a [routerLink]="'/creator-profile'"><img [src]="item.client" class="avatar avatar-md-sm rounded-pill shadow img-thumbnail" alt=""></a>
                        </div>
                    </div>

                    <div class="content pt-4 position-relative">
                        <a [routerLink]="['/nft-detail',item.id]" class="text-dark link-title h6">{{item.name}}</a>

                        <div class="d-flex justify-content-between mt-2">
                            <span class="rate text-primary">{{item.value}}</span>
                            <span class="text-dark">{{item.item}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mt-4">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Previous">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-left align-middle fs-6"></i></span>
                        </a>
                    </li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">1</a></li>
                    <li class="page-item active"><a class="page-link" [routerLink]="[]">2</a></li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">3</a></li>
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Next">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-right align-middle fs-6"></i></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>

<app-footer/>
