<div id="boxed-layput" style="background: url('assets/images/hero/bg-squre.png');">
    <div class="boxed">
        <app-navlight/>

        <section class="section overflow-hidden">
            <div class="container">
                <div class="row align-items-center g-4">
                    <div class="col-lg-7 col-md-6 order-2 order-md-1">
                        <div class="title-heading">
                            <h1 class="display-4 fw-bold mb-3">Discover top creative <br> <span class="text-primary">talents</span> & <span class="text-primary">portfolios</span></h1>
                            <p class="para-desc text-muted mb-0">An independent design agency based in Newyork.</p>
                        </div>
                    </div>

                    <div class="col-lg-5 col-md-6 order-1 order-md-2">
                        <div class="position-relative">
                            <img [src]="'assets/images/logo-icon.png'" class="img-fluid opacity-25" alt="">
                            <div class="position-absolute top-50 start-50 translate-middle">
                                <a href="#!" data-bs-toggle="modal" data-bs-target="#staticBackdrop" class="avatar avatar-md-md rounded-pill shadow bg-primary d-flex justify-content-center align-items-center lightbox">
                                    <i class="mdi mdi-play mdi-24px text-white"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>


        <section class="section pt-1">
            <div class="container">
                <div class="column-4 gap-0" id="grid">
                    <div *ngFor="let item of portfolio" class="picture-item">
                        <div class="portfolio masonry position-relative overflow-hidden">
                            <div class="position-relative overflow-hidden image">
                                <img [src]="item.image" class="img-fluid" alt="">
                                <div class="position-absolute start-0 end-0 top-0 bottom-0 overlay rounded bg-black m-4"></div>
                            </div>

                            <div class="content">
                                <div class="title-body p-3 position-absolute start-0 end-0 m-4">
                                    <a [routerLink]="[]" class="link-title text-white fs-5 fw-medium">{{item.title}}</a>
                                    <p class="text-white-50 mb-0">{{item.name}}</p>
                                </div>

                                <div class="p-3 position-absolute top-0 end-0 m-4">
                                    <lightgallery>
                                        <a [href]="item.image" class="btn btn-sm btn-icon btn-pills btn-primary lightbox"><i data-feather="camera" class="fea icon-sm"></i></a>
                                    </lightgallery>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <div class="mt-4 text-center">
                            <a [routerLink]="[]" class="btn btn-primary">See more works <i class="mdi mdi-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <app-footer/>
    </div>
<div>
